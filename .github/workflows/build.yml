name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write   # needed to create/upload releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: "Video Life-mac.zip"
          - os: windows-latest
            platform: windows
            artifact: "Video Life-windows.zip"
          - os: ubuntu-22.04
            platform: linux
            artifact: "Video Life-linux.tar.gz"

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python 3.12 ───────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── Linux system deps ─────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libportaudio2 libportaudiocpp0 portaudio19-dev \
            libsndfile1 \
            libgl1-mesa-glx libgles2-mesa \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 libdbus-1-3 \
            libgstreamer1.0-0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good

      # ── Python dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies (all platforms)
        run: pip install -r requirements.txt pyinstaller

      - name: Install macOS-only dependencies
        if: runner.os == 'macOS'
        run: |
          pip install \
            pyobjc-core \
            pyobjc-framework-AVFoundation \
            pyobjc-framework-Cocoa \
            pyobjc-framework-CoreAudio \
            pyobjc-framework-CoreMedia \
            pyobjc-framework-Quartz

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller video_life.spec --clean --noconfirm

      # ── Package: macOS → zip (users right-click → Open to bypass Gatekeeper)
      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "../${{ matrix.artifact }}" "Video Life.app"

      # ── Package: Windows → zip
      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Video Life" -DestinationPath "${{ matrix.artifact }}"

      # ── Package: Linux → tar.gz
      - name: Package Linux app
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf "../${{ matrix.artifact }}" "Video Life"

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Video Life ${{ github.ref_name }}"
          body: |
            ## Video Life ${{ github.ref_name }}

            A real-time GPU video synthesizer — 9 GLSL synthesis engines, audio/MIDI reactive.

            ### Download
            | Platform | File |
            |----------|------|
            | 🍎 macOS | `Video Life-mac.zip` — extract and right-click → Open (first launch) |
            | 🪟 Windows | `Video Life-windows.zip` — extract and run `Video Life.exe` |
            | 🐧 Linux | `Video Life-linux.tar.gz` — extract and run `Video Life` |

            ### Requirements
            - macOS 12+, Windows 10+, or Ubuntu 22.04+ / equivalent
            - GPU with OpenGL 3.3+ support
          files: |
            artifacts/Video Life-mac.zip
            artifacts/Video Life-windows.zip
            artifacts/Video Life-linux.tar.gz
          draft: false
          prerelease: false
